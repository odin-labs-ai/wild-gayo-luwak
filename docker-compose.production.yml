services:
  web:
    image: ghcr.io/odin-labs-ai/wild-gayo-luwak:latest
    container_name: wgl-web
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATA_DIR=/app/data
    restart: unless-stopped
    volumes:
      - db-data:/app/data
    networks:
      - default
      - traefik
    labels:
      - "odin.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.wgl.rule=Host(`wildgayoluwak.com`) || Host(`www.wildgayoluwak.com`)"
      - "traefik.http.routers.wgl.entrypoints=websecure"
      - "traefik.http.routers.wgl.tls.certresolver=letsencrypt"
      - "traefik.http.services.wgl.loadbalancer.server.port=5000"
      - "traefik.http.routers.wgl.priority=100"
      # www -> non-www redirect
      - "traefik.http.routers.wgl-www.rule=Host(`www.wildgayoluwak.com`)"
      - "traefik.http.routers.wgl-www.entrypoints=websecure"
      - "traefik.http.routers.wgl-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.wgl-www.middlewares=wgl-www-redirect"
      - "traefik.http.middlewares.wgl-www-redirect.redirectregex.regex=^https://www\\.wildgayoluwak\\.com/(.*)"
      - "traefik.http.middlewares.wgl-www-redirect.redirectregex.replacement=https://wildgayoluwak.com/$${1}"
      - "traefik.http.middlewares.wgl-www-redirect.redirectregex.permanent=true"

volumes:
  db-data:

networks:
  traefik:
    external: true
    name: control-tower_odin-network
